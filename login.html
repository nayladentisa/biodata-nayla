<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Petloop - Masuk atau Daftar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "on-secondary-fixed": "#001d34",

                    "on-background": "#1b1c1c",

                    "on-error": "#ffffff",

                    "on-secondary-fixed-variant": "#004a78",

            },

                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "8px",
                    "gutter": "24px",
                    "xl": "80px",
                    "sm": "12px",
                    "margin": "32px",
                    "md": "24px",
                    "xs": "4px",
                    "lg": "48px"
            },
            "fontFamily": {
                    "headline-md": ["Plus Jakarta Sans"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],

            "fontSize": {

                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}]

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pet-pattern {
            background-color: #fbf9f8;
            background-image: radial-gradient(#7cb1e6 0.5px, transparent 0.5px), radial-gradient(#7cb1e6 0.5px, #fbf9f8 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.15;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- Auth Layout Wrapper -->
<main class="min-h-screen flex items-center justify-center p-gutter relative overflow-hidden">
<!-- Background Decorations -->
<div class="absolute inset-0 pet-pattern pointer-events-none"></div>
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary-container/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-primary-container/20 rounded-full blur-[100px]"></div>
<!-- Auth Container -->
<div class="w-full max-w-[480px] z-10">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-lg">
<div class="w-24 h-24 mb-md rounded-[32px] overflow-hidden shadow-lg border-4 border-white">
<img class="w-full h-full object-cover" data-alt="A professional and friendly logo for Petloop, featuring a stylized minimalist paw print combined with a circular loop icon. The aesthetic is clean and modern, using a vibrant palette of amber and soft blue against a high-contrast white background. The lighting is soft and even, emphasizing the smooth, high-quality vector-style finish suitable for a premium pet care brand." src="https://lh3.googleusercontent.com/aida/ADBb0ugnJlcTwyX5xJqTjCabjU0TlBL0LQqvPWzqd0Nk1IYOSK5KhdCF6UpBXYxiKrdP_YxyAGzObuy4661NFLCa39Yzjh6RA2WUJ0wWLvv4HwmPAWczOi5bbu8wG-fiX7R4b8AtwDArBDmbygPP2OhkDOMx9xaOjqa2gr5TDh7KS5Pw2nwPAEzi8bTsWlm0WGByve4tdjddh0TEIvsldsgZBTCre1IECVFeANxUexEImHakfUaihHqGJ5qTIwgPTGzkvAs1FSiRxbU"/>
</div>
<h1 class="font-display-lg text-headline-lg text-primary tracking-tight">Petloop</h1>
<p class="font-body-md text-on-surface-variant text-center mt-2 px-margin">Pendamping Terpercaya Hewan Peliharaan Anda</p>
</div>
<!-- Tab / Toggle Card -->
<div class="glass-morphism rounded-[32px] p-2 shadow-sm mb-gutter flex items-center">
<button class="flex-1 py-3 px-6 rounded-[24px] font-label-md text-label-md transition-all duration-300 bg-primary-container text-on-primary-container shadow-md">
                    Masuk
                </button>
<button class="flex-1 py-3 px-6 rounded-[24px] font-label-md text-label-md transition-all duration-300 text-on-surface-variant hover:bg-surface-container-high">
                    Daftar
                </button>
</div>
<!-- Form Card -->
<div class="bg-white rounded-[32px] p-margin shadow-xl border border-surface-variant">
<form action="#" class="space-y-gutter" method="POST">
<!-- Email/Username Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="username">Email atau Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border border-outline-variant rounded-xl focus:outline-none focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all text-body-md font-body-md" id="username" name="username" placeholder="nama@email.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary hover:underline" href="#">Lupa Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border border-outline-variant rounded-xl focus:outline-none focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all text-body-md font-body-md" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center space-x-3 ml-1">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/30" id="remember" type="checkbox"/>
<label class="font-body-md text-label-md text-on-surface-variant cursor-pointer" for="remember">Ingat saya di perangkat ini</label>
</div>
<!-- Primary CTA -->
<button class="w-full py-4 bg-primary-container text-on-primary-container font-headline-md text-body-lg rounded-full shadow-lg shadow-primary-container/20 hover:scale-[1.02] active:scale-95 transition-all duration-200" type="submit">
                        Masuk Sekarang
                    </button>
</form>
<!-- Social Login Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-white px-4 font-label-md text-label-md text-outline">Atau masuk dengan</span>
</div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-3 py-3 border border-outline-variant rounded-xl hover:bg-surface-container transition-colors group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-label-md text-label-md text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 border border-outline-variant rounded-xl hover:bg-surface-container transition-colors group">
<div class="w-5 h-5 bg-[#06C755] rounded-sm flex items-center justify-center">
<svg class="w-3.5 h-3.5 fill-white" viewbox="0 0 24 24">
<path d="M24 10.3c0-4.6-4.8-8.3-10.7-8.3S2.7 5.7 2.7 10.3c0 4.1 3.8 7.5 8.9 8.2l-1.6 3.7c-.1.2 0 .4.2.5.1.1.2.1.3 0l4.3-2.6h.1c5.1-.3 9.1-3.7 9.1-7.8z"></path>
</svg>
</div>
<span class="font-label-md text-label-md text-on-surface">LINE</span>
</button>
</div>
</div>
<!-- Footer Help -->
<p class="text-center mt-gutter font-body-md text-label-md text-on-surface-variant">
                Belum punya akun? 
                <a class="text-secondary font-bold hover:underline" href="#">Daftar sekarang</a>
</p>
<div class="mt-xl text-center">
<p class="font-label-md text-[12px] text-outline">
                    © 2024 Petloop. Seluruh hak cipta dilindungi undang-undang.<br/>
                    Dengan masuk, Anda menyetujui <a class="underline" href="#">Syarat &amp; Ketentuan</a> kami.
                </p>
</div>
</div>
</main>
<!-- Bottom Spacing for Mobile -->
<div class="h-10 lg:hidden"></div>
</body></html>
